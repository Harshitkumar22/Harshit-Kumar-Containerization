services:

  database:
    build: ./database
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Harshit

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      ipvlan_net:
        ipv4_address: 192.168.100.21

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      retries: 5


  backend:
    build: ./backend
    container_name: node_backend
    restart: always

    environment:
      DB_HOST: database   # 🔥 VERY IMPORTANT
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Harshit

    depends_on:
      database:
        condition: service_healthy

    networks:
      ipvlan_net:
        ipv4_address: 192.168.100.20

    
    ports:
      - "3000:3000"


volumes:
  pgdata:

networks:
  ipvlan_net:
    external: true