version: "3.9"

services:

  database:
    build: ./database
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: node_backend
    restart: always

    environment:
      DB_HOST: database
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    depends_on:
      - database

    ports:
      - "3000:3000"

volumes:
  pgdata:
