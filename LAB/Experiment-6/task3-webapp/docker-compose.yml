services:
  webapp:
    image: node:18-alpine
    container_name: webapp
    command: ["node", "-e", "require('http').createServer((req,res)=>res.end('Hello from Compose')).listen(5000)"]
    ports:
      - "5000:5000"
    environment:
      APP_ENV: production
      DEBUG: "false"
    restart: unless-stopped
